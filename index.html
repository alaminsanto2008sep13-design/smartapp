<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAdBD - Earn Money</title>
    <!-- টেলিগ্রাম মেইন স্ক্রিপ্ট (৪ নম্বর লাইন) -->
    <script src="https://telegram.org"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: white; padding-bottom: 80px; overflow-x: hidden; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; }
        .balance-box { background: rgba(56, 189, 248, 0.1); padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid #334155; }
        .balance-box h2 { color: #38bdf8; font-size: 32px; }
        .section { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        .btn-main { background: #38bdf8; color: #0f172a; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-main:disabled { background: #64748b; cursor: not-allowed; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { color: #94a3b8; font-size: 12px; text-align: center; flex: 1; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <p>স্বাগতম, মেম্বার 👋</p>
    <div class="balance-box">
        <p>আপনার ব্যালেন্স</p>
        <h2 id="user-balance">৳ 0.00</h2>
    </div>
</div>

<!-- HOME SECTION -->
<div id="home" class="section active">
    <div class="card">
        <h3 style="color:#38bdf8;">আজকের নোটিশ 📢</h3>
        <p style="color:#94a3b8; margin-top:10px;">অ্যাডে ক্লিক করে ৪০ সেকেন্ড অপেক্ষা করুন। ২০ পয়সা বোনাস পাবেন।</p>
    </div>
</div>

<!-- EARN SECTION -->
<div id="earn" class="section">
    <div class="card">
        <h3>ভিডিও দেখে আয় করুন 📺</h3>
        <p id="timer-text" style="color:#94a3b8; margin-bottom:15px;">বাটনে ক্লিক করে সোশ্যাল বার অ্যাডগুলো দেখুন।</p>
        <button id="ad-btn" class="btn-main" onclick="startTask()">আয় করুন</button>
    </div>
</div>

<!-- WITHDRAW SECTION -->
<div id="withdraw" class="section">
    <div class="card">
        <h3>টাকা উত্তোলন করুন 💸</h3>
        <select id="method">
            <option value="bkash">বিকাশ (Personal)</option>
            <option value="nagad">নগদ (Personal)</option>
        </select>
        <input type="number" id="amount" placeholder="টাকার পরিমাণ">
        <input type="text" id="phone" placeholder="নাম্বার দিন">
        <button class="btn-main" onclick="alert('রিকোয়েস্ট জমা হয়েছে!')">উইথড্র</button>
    </div>
</div>

<!-- PROFILE SECTION -->
<div id="profile" class="section">
    <div class="card" style="text-align:center;">
        <h3 id="prof-name">ইউজার প্রোফাইল</h3>
        <p style="color:#94a3b8; margin-top:10px;">আপনার সকল তথ্য এখানে পাবেন।</p>
    </div>
</div>

<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="showSection('home', this)">🏠<br>হোম</div>
    <div class="nav-item" onclick="showSection('earn', this)">💰<br>আয়</div>
    <div class="nav-item" onclick="showSection('withdraw', this)">💸<br>উইথড্র</div>
    <div class="nav-item" onclick="showSection('profile', this)">👤<br>প্রোফাইল</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function showSection(sectionId, element) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
    }

    function startTask() {
        let btn = document.getElementById("ad-btn");
        btn.disabled = true;
        alert("অ্যাড লোড হচ্ছে... স্ক্রিনে আসা অ্যাডে ক্লিক করুন এবং ৪০ সেকেন্ড অপেক্ষা করুন।");
        
        let timeLeft = 40; 
        let timer = setInterval(() => {
            btn.innerHTML = `অপেক্ষা করুন (${timeLeft}s)`;
            timeLeft--;
            if (timeLeft < 0) {
                clearInterval(timer);
                btn.innerHTML = "আয় করুন";
                btn.disabled = false;
                tg.sendData("add_money"); 
                alert("অভিনন্দন! ২০ পয়সা যোগ হয়েছে।");
                tg.close(); 
            }
        }, 1000);
    }
‎</script>
‎<script type='' src="https://pl29195607.profitablecpmratenetwork.com/1e/20/88/1e208832404b2196bf31079bff18420d.js"></script>
‎</body>
‎</html>
