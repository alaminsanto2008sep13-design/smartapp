<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartAdBD</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* ১. প্রোফাইল সেকশন - তোর সেই ইউনিক গোল ডিজাইন */
        .profile-area { padding-top: 15px; text-align: center; background: #1e293b; padding-bottom: 10px; border-bottom: 1px solid #3b82f6; }
        .u-pic { 
            width: 65px; height: 65px; border-radius: 50%; border: 2.5px solid #3b82f6; 
            margin: 0 auto 8px; object-fit: cover; background: #334155; display: block;
        }
        .u-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; display: block; }
        .u-id { background: #3b82f6; color: white; padding: 2px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; display: inline-block; }

        /* ২. নোটিশ বোর্ড */
        .notice-board { 
            background: rgba(239, 68, 68, 0.15); border-left: 4px solid #ef4444; 
            margin: 12px 15px; padding: 10px; font-size: 11.5px; text-align: left; border-radius: 4px;
        }

        /* ৩. কারেন্ট ব্যালেন্স */
        .bal-container { text-align: center; margin-bottom: 10px; }
        .bal-title { font-size: 12px; color: #94a3b8; }
        .bal-num { font-size: 32px; color: #10b981; font-weight: bold; margin-top: 2px; }

        /* ৪. বাটন গ্রিড - সাইজ একদম লক করা */
        .btn-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            padding: 0 15px; margin-top: 5px;
        }
        .custom-btn { 
            background: #ffffff; color: #0f172a; height: 65px; /* ফিক্সড ছোট সাইজ */
            border-radius: 12px; font-weight: bold; font-size: 12.5px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4.5px 0 #cbd5e1; cursor: pointer; text-align: center;
        }
        .custom-btn:active { transform: translateY(2.5px); box-shadow: 0 1px 0 #cbd5e1; }

        /* ৫. বটম নেভিগেশন - স্টিকি ও ফিক্সড */
        .footer-nav { 
            margin-top: auto; background: #ffffff; display: flex; 
            justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0;
        }
        .nav-link { color: #64748b; font-size: 11.5px; font-weight: 600; flex: 1; text-align: center; text-decoration: none; }
        .nav-link.active { color: #3b82f6; }
    </style>
</head>
<body>

    <div class="profile-area">
        <img id="p_img" class="u-pic" src="https://ui-avatars.com">
        <span id="p_name" class="u-name">Loading User...</span>
        <div class="u-id">UID: <span id="p_id">000000000</span></div>
    </div>

    <div class="notice-board">
        📢 <b>নিরাপদ নোটিশ:</b> ২টি ভিডিও অ্যাড অবশ্যই সম্পূর্ণ দেখুন। আপনার রেফার করা মেম্বার ১০টি অ্যাড দেখলে তবেই বোনাস পাবেন। মিনিমাম উইথড্র ২০ টাকা।
    </div>

    <div class="bal-container">
        <div class="bal-title">Current Balance</div>
        <div class="bal-num">৳ <span id="main_balance">0.00</span></div>
    </div>

    <div class="btn-grid">
        <div class="custom-btn" onclick="runAds()">WATCH ADS</div>
        <div class="custom-btn" onclick="alert('VIP 1-20 Locked')">VIP REWARDS</div>
        <div class="custom-btn" onclick="alert('Income History')">TOTAL INCOME</div>
        <div class="custom-btn" onclick="alert('Withdraw System')">WITHDRAW</div>
    </div>

    <div class="footer-nav">
        <div class="nav-link active">Home</div>
        <div class="nav-link">Earn</div>
        <div class="nav-link">Tasks</div>
        <div class="nav-link">Refer</div>
        <div class="nav-link">Profile</div>
    </div>

    <script>
        let webapp = window.Telegram.WebApp;
        webapp.expand();
        webapp.ready();

        // ইউজার ডাটা ফিক্স
        let userData = webapp.initDataUnsafe.user;
        if (userData) {
            document.getElementById('p_name').innerText = userData.first_name + (userData.last_name ? " " + userData.last_name : "");
            document.getElementById('p_id').innerText = userData.id;
            if (userData.photo_url) document.getElementById('p_img').src = userData.photo_url;
        }

        function runAds() {
            alert("১ম অ্যাড লোড হচ্ছে (২৫ সেকেন্ড)...");
            setTimeout(() => {
                alert("২য় অ্যাড লোড হচ্ছে (২৫ সেকেন্ড)...");
                setTimeout(() => {
                    let b = document.getElementById('main_balance');
                    let current = parseFloat(b.innerText);
                    b.innerText = (current + 0.15).toFixed(2);
                    alert("অভিনন্দন! ১৫ পয়সা যোগ হয়েছে।");
                }, 25000);
            }, 25000);
        }
    </script>
</body>
</html>
