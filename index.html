<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartAdBD</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #0f172a; color: white; font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .page { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; text-align: center; }
        .active-page { display: block; }

        /* তোর সেই ৩ডি হোয়াইট বাটন ডিজাইন */
        .pill-btn { 
            background: #ffffff; color: #000; width: 100%; padding: 18px; 
            border-radius: 40px; font-weight: bold; font-size: 16px; 
            box-shadow: 0 6px 0 #b1b1b1; cursor: pointer; border: none;
            margin-bottom: 15px; display: block; text-align: center;
        }
        .pill-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b1b1b1; }
        
        /* ছোট ৩ডি বাটন গ্রিড (প্রোফাইলের জন্য) */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .small-pill { padding: 15px 5px; font-size: 13px; }

        /* হোম - নোটিশ */
        .notice-box { background: rgba(239, 68, 68, 0.1); border-left: 5px solid #ef4444; padding: 15px; text-align: left; border-radius: 10px; margin-top: 20px; }

        /* প্রোফাইল এলিমেন্টস */
        .p-circle { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #3b82f6; margin: 0 auto 10px; background: #eee; }
        .p-name { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

        /* বটম নেভিগেশন (তোর ইমেজের মতো আইকনসহ) */
        .navbar { background: #ffffff; display: flex; justify-content: space-around; padding: 8px 0; border-top: 1px solid #ddd; }
        .nav-item { color: #000; font-size: 11px; font-weight: bold; flex: 1; text-align: center; cursor: pointer; }
        .nav-active { color: #3b82f6; }
        .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <!-- ১. হোম পেজ (শুধু নোটিশ) -->
    <div id="home" class="page active-page">
        <h2 style="color: #3b82f6;">Home Notice</h2>
        <div class="notice-box">
            📢 <b>জরুরি নিয়ম:</b> <br><br>
            - ২টি ভিডিও অ্যাড ২৫+২৫ সে. অবশ্যই দেখুন। <br>
            - ১০টি অ্যাড দেখলে আপনার রেফারেল এক্টিভ হবে। <br>
            - মিনিমাম উইথড্র ২০ টাকা।
        </div>
    </div>

    <!-- ২. আর্ন/টাস্ক পেজ -->
    <div id="earn" class="page">
        <h2 style="color: #3b82f6;">Earn Money</h2>
        <button class="pill-btn" onclick="startAds()">WATCH ADS (2 Videos)</button>
        <p style="font-size: 12px; color: #94a3b8;">প্রতি ২টি অ্যাডে ১৫ পয়সা পাবেন।</p>
    </div>

    <!-- ৩. প্রোফাইল পেজ (তোর ইমেজের মতো বাটন গ্রিড) -->
    <div id="profile" class="page">
        <div class="p-circle"></div>
        <div id="u_name" class="p-name">Loading...</div>
        
        <button class="pill-btn">Balance: <span id="balance">0.00</span> taka</button>
        
        <div class="grid-2">
            <button class="pill-btn small-pill">Edit Profile</button>
            <button class="pill-btn small-pill">Bonus Reward</button>
            <button class="pill-btn small-pill">Referral History</button>
            <button class="pill-btn small-pill">Withdrawal</button>
            <button class="pill-btn small-pill">VIP Rewards</button>
            <button class="pill-btn small-pill">Total Income</button>
        </div>
        
        <button class="pill-btn small-pill" style="width: 60%; margin: 10px auto;">Customer Support</button>
    </div>

    <!-- ৪. রেফার পেজ -->
    <div id="refer" class="page">
        <h2 style="color: #3b82f6;">Refer & Earn</h2>
        <button class="pill-btn">Invite 5 Friends -> Get ৳2</button>
        <button class="pill-btn">Invite 10 Friends -> Get ৳4</button>
    </div>

    <!-- বটম মেনু (আইকনসহ) -->
    <div class="navbar">
        <div class="nav-item nav-active" onclick="showP('home', this)"><span class="nav-icon">🏠</span>Home</div>
        <div class="nav-item" onclick="showP('earn', this)"><span class="nav-icon">💰</span>Earn</div>
        <div class="nav-item" onclick="showP('profile', this)"><span class="nav-icon">👤</span>Profile</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }

        if (tg.initDataUnsafe.user) {
            document.getElementById('u_name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function startAds() {
            alert("১ম অ্যাড (২৫ সে.) শুরু...");
            setTimeout(() => {
                alert("২য় অ্যাড (২৫ সে.) শুরু...");
                setTimeout(() => {
                    let bal = document.getElementById('balance');
                    bal.innerText = (parseFloat(bal.innerText) + 0.15).toFixed(2);
                    alert("১৫ পয়সা যোগ হয়েছে!");
                }, 25000);
            }, 25000);
        }
    </script>
</body>
</html>
