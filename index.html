<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Earn Pro</title>
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #080808; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 24px; }
        .nav-item { color: #666; transition: 0.3s; cursor: pointer; }
        .active-nav { color: #FFD700 !important; }
        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .gold-btn { background: linear-gradient(90deg, #FFD700, #B8860B); color: black; font-weight: bold; }
    </style>
</head>
<body class="pb-24">

    <!-- Home Page -->
    <div id="home-page" class="page active-page p-5">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black text-yellow-500 tracking-tighter">SMART EARN PRO</h1>
            <div class="glass-card px-4 py-1 text-[10px] border-yellow-500/50 text-yellow-500">PREMIUM</div>
        </div>
        
        <div class="glass-card p-8 text-center mb-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-20 h-20 bg-yellow-500/10 rounded-full blur-2xl"></div>
            <p class="text-gray-400 text-xs uppercase tracking-widest">Available Balance</p>
            <h2 class="text-5xl font-black text-white mt-2">৳ <span id="balance">0.00</span></h2>
        </div>

        <div onclick="showPage('task-page')" class="glass-card p-5 flex justify-between items-center bg-gradient-to-r from-yellow-500/10 to-transparent border-l-4 border-l-yellow-500">
            <div class="flex items-center gap-4">
                <i class="fas fa-bolt text-2xl text-yellow-500"></i>
                <div>
                    <h3 class="font-bold">Start Task</h3>
                    <p class="text-[10px] text-gray-500">Watch Ads & Earn 5 Taka</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-600"></i>
        </div>
    </div>

    <!-- Task Page -->
    <div id="task-page" class="page p-5">
        <h2 class="text-2xl font-bold mb-6">Daily Tasks</h2>
        <div class="glass-card p-8 text-center border-dashed border-2 border-yellow-500/30">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-play text-3xl text-yellow-500"></i>
            </div>
            <h3 class="font-bold text-lg text-yellow-500">Watch Video Ad</h3>
            <p class="text-gray-500 text-xs mt-1 mb-6">Complete the video to get reward</p>
            <button onclick="watchAd()" class="gold-btn w-full py-4 rounded-2xl shadow-lg shadow-yellow-500/20">WATCH NOW</button>
        </div>
    </div>

    <!-- Withdraw Page -->
    <div id="withdraw-page" class="page p-5">
        <h2 class="text-2xl font-bold mb-6">Cash Out</h2>
        <div class="glass-card p-6 space-y-5">
            <div>
                <label class="text-xs text-gray-500 ml-1">Payment Method</label>
                <select id="method" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mt-1 text-white focus:border-yellow-500 outline-none">
                    <option>Bkash</option>
                    <option>Nagad</option>
                    <option>Rocket</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-gray-500 ml-1">Account Number</label>
                <input type="number" id="phone" placeholder="017XXXXXXXX" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mt-1 text-white focus:border-yellow-500 outline-none">
            </div>
            <div>
                <label class="text-xs text-gray-500 ml-1">Amount</label>
                <input type="number" id="amount" placeholder="Min 200 BDT" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mt-1 text-white focus:border-yellow-500 outline-none">
            </div>
            <button onclick="requestWithdraw()" class="gold-btn w-full py-4 rounded-2xl mt-4">SUBMIT REQUEST</button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 w-full bg-black/90 backdrop-blur-lg border-t border-gray-900 flex justify-around py-4 px-2 z-50">
        <div id="nav-home" onclick="showPage('home-page')" class="nav-item active-nav flex flex-col items-center">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </div>
        <div id="nav-task" onclick="showPage('task-page')" class="nav-item flex flex-col items-center">
            <i class="fas fa-grid-2 text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Task</span>
        </div>
        <div id="nav-withdraw" onclick="showPage('withdraw-page')" class="nav-item flex flex-col items-center">
            <i class="fas fa-wallet text-lg"></i>
            <span class="text-[10px] mt-1 font-medium">Withdraw</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            // Show selected page
            document.getElementById(pageId).classList.add('active-page');
            
            // Update Navigation UI
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            if(pageId === 'home-page') document.getElementById('nav-home').classList.add('active-nav');
            if(pageId === 'task-page') document.getElementById('nav-task').classList.add('active-nav');
            if(pageId === 'withdraw-page') document.getElementById('nav-withdraw').classList.add('active-nav');
        }

        function watchAd() {
            tg.showConfirm("ভিডিও অ্যাড দেখলে ৫ টাকা পাবেন। আপনি কি রাজি?", (ok) => {
                if(ok) {
                    // আপাতত ম্যানুয়ালি টাকা যোগ হচ্ছে
                    let currentBal = parseFloat(document.getElementById('balance').innerText);
                    document.getElementById('balance').innerText = (currentBal + 5.0).toFixed(2);
                    tg.showAlert("Success! ৫ টাকা আপনার ব্যালেন্সে যোগ হয়েছে।");
                    showPage('home-page');
                }
            });
        }

        function requestWithdraw() {
            let phone = document.getElementById('phone').value;
            let amount = document.getElementById('amount').value;
            if(phone && amount >= 200) {
                tg.showAlert("আপনার উইথড্র রিকোয়েস্ট সফল হয়েছে। ২৪ ঘণ্টার মধ্যে পেমেন্ট পাবেন।");
            } else {
                tg.showAlert("সঠিক তথ্য দিন। মিনিমাম উইথড্র ২০০ টাকা।");
            }
        }
    </script>
</body>
</html>
